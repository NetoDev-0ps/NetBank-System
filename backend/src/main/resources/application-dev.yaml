spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:bancodigital_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

jwt:
  secret: ${JWT_SECRET}
  previous-secrets: ${JWT_PREVIOUS_SECRETS:}
  expiration-minutes: ${JWT_EXP_MINUTES:60}
  issuer: ${JWT_ISSUER:netbank-api}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

auth:
  captcha:
    enabled: ${AUTH_CAPTCHA_ENABLED:true}
    challenge-ttl-seconds: ${AUTH_CAPTCHA_CHALLENGE_TTL_SECONDS:180}
    proof-ttl-seconds: ${AUTH_CAPTCHA_PROOF_TTL_SECONDS:120}
    tolerance: ${AUTH_CAPTCHA_TOLERANCE:4}
    min-value: ${AUTH_CAPTCHA_MIN_VALUE:0}
    max-value: ${AUTH_CAPTCHA_MAX_VALUE:100}

management:
  endpoint:
    health:
      show-details: always
      show-components: always

