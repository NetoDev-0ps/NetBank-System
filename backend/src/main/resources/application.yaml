spring:
  application:
    name: bancodigital

  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:./backend/.env[.properties]

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

  jpa:
    open-in-view: false

admin:
  email: ${ADMIN_EMAIL:}
  nome: ${ADMIN_NAME:Administrador Master}
  senha-hash: ${ADMIN_PASSWORD_HASH:}

auth:
  cookie:
    name: ${AUTH_COOKIE_NAME:NETBANK_AUTH}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Strict}
    path: ${AUTH_COOKIE_PATH:/}
  login-protection:
    enabled: ${AUTH_LOGIN_PROTECTION_ENABLED:true}
    max-attempts: ${AUTH_LOGIN_MAX_ATTEMPTS:5}
    attempt-window-minutes: ${AUTH_LOGIN_ATTEMPT_WINDOW_MINUTES:15}
    lock-minutes: ${AUTH_LOGIN_LOCK_MINUTES:15}
  captcha:
    enabled: ${AUTH_CAPTCHA_ENABLED:true}
    challenge-ttl-seconds: ${AUTH_CAPTCHA_CHALLENGE_TTL_SECONDS:180}
    proof-ttl-seconds: ${AUTH_CAPTCHA_PROOF_TTL_SECONDS:120}
    tolerance: ${AUTH_CAPTCHA_TOLERANCE:4}
    min-value: ${AUTH_CAPTCHA_MIN_VALUE:0}
    max-value: ${AUTH_CAPTCHA_MAX_VALUE:100}

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:local}
    environment: ${SPRING_PROFILES_ACTIVE:dev}

